<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Big Plum Tech</title>
    <link rel="stylesheet" href="/Pages/Assets/CSS/Contacts-style.css">
    <script defer src="/Pages/Assets/JS/navbar-footer-loader.js"></script>
</head>

<body>
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Contact Section -->
    <section class="contact fade-in" id="contact-panel">
        <h2>Get in Touch</h2>
        <p>Have questions or need assistance? Reach out to us!</p>
        
        <div class="contact-container">
            <!-- Contact Details -->
            <div class="contact-info">
                <h3>Contact Information</h3>
                <p><i class="fa fa-envelope"></i> Email: <a href="mailto:support@bigplumtech.com">support@bigplumtech.com</a></p>
                <p><i class="fa fa-phone"></i> Phone: +idk</p>
                <p><i class="fa fa-map-marker-alt"></i> Address: Heriot-Watt University</p>

                <!-- Social Media Links -->
                <div class="social-links">
                    <h1>Socials</h1><br>
                    <a href="#"><i class="fa fa-facebook"></i></a>
                    <a href="#"><i class="fa fa-twitter"></i></a>
                    <a href="#"><i class="fa fa-instagram"></i></a>
                    <a href="#"><i class="fa fa-linkedin"></i></a>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form">
                <h3>Send Us a Message</h3>
                <form id="contactForm">
                    <input type="text" id="name" placeholder="Your Name" required>
                    <input type="email" id="email" placeholder="Your Email" required>
                    <textarea id="message" placeholder="Your Message" required></textarea>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!--Temporary script as well-->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const fadeInElements = document.querySelectorAll(".fade-in");
            fadeInElements.forEach(el => el.classList.add("visible"));
        });
    </script>
</body>
</html>
