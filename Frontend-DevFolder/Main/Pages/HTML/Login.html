<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Big Plum Tech</title>
    <link rel="stylesheet" href="/Pages/Assets/CSS/Login-Registration.css">
    <script src="/Pages/Assets/JS/content-loader.js"></script>
</head>
<body>
    
    <div class="container-login">
        <!-- Left Section: Promo Text -->
        <div class="promo-text">
            <h2>Welcome Back!</h2>
            <p>Login to your Big Plum Tech account and access exclusive features.</p>
            <p>Seamless experience with high security and reliability.</p>
        </div>

        <!-- Right Section: Login Form -->
        <div class="form-box">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="email">Email:</label>
                <input placeholder="Email" type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input placeholder="Password" type="password" id="password" name="password" required>

                <button type="submit" class="submit-button">Login</button>
            </form>
            <p id="loginErrorMessage" class="error-message"></p>
            <p>Don't have an account? <a href="registration.html">Register here</a></p>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer"></div>
</body>
</html>
