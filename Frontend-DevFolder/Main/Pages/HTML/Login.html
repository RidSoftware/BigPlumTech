<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Big Plum Tech</title>
    <link rel="stylesheet" href="/Software Engineering Project 2/Main/Pages/Assets/CSS/Login-Registration.css">
</head>
<body>
    <!--Navbar-->
    <div id="navbar"></div>
    
    <!--Login component-->
    <div class="container">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Login</button>
        </form>
        <p id="loginErrorMessage" class="error-message"></p>
        <p>Don't have an account? <a href="Registration.html">Register here</a></p>
    </div>

    <!--Footer-->
    <div id="footer"></div>

    <!--Script for content loading-->
    <script src="/Software Engineering Project 2/Main/Pages/Assets/JS/content-loader.js"></script>

</body>
</html>
