<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Big Plum Tech</title>
    <link rel="stylesheet" href="/Pages/Assets/CSS/Login-Registration.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script defer src="/Pages/Assets/JS/login-validation.js"></script>
    <script defer src="/Pages/Assets/JS/content-loader.js"></script>
</head>
<body>

    <div class="page-container">
        
        <!-- Left Section: Promotional Content -->
        <div class="promo-text">
            <h2>Welcome Back!</h2>
            <p>Unlock exclusive features by logging in.</p>
            <p>Seamlessly manage your smart home with our technology.</p>
        </div>

        <!-- Right Section: Login Form -->
        <div class="container-login">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="email">Email:</label>
                <input placeholder="Email" type="email" id="email" name="email" required>
        
                <label for="password">Password:</label>
                <div class="password-container">
                    <input placeholder="Password" type="password" id="password" name="password" required>
                    <i class="fa fa-eye-slash" id="togglePassword"></i>
                </div>

                <p id="loginErrorMessage" class="error-message"></p>
        
                <button type="submit" class="submit-button">Login</button>
            </form>
            <br>
            <p>Don't have an account? <a href="Registration.html">Register here</a></p>
        </div>        
    </div>

    <div class="return-href">
        <a id="return-id" href="index.html">Return</a>
    </div>

    <!-- Footer-->
    <div id="footer"></div>
</body>
</html>
