<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Home</title>
  <link rel="stylesheet" href="/Pages/Assets/CSS/styles.css">

  <script src="/Pages/Assets/JS/navbar-footer-loader.js"></script>
  <script src="/Pages/Assets/JS/script.js"></script>
</head>
<body>
  <div id="navbar"></div>

 <!-- Content Wrapper -->
 <div class="content-wrapper">
    
  <!-- Main Header with Big Logo and Welcome Text -->

    <div class="header-text">
      <h2 id="profile-name"></h2>
      <p>To Your Home Page</p><br>
    </div>
  </div>

  <!-- Energy Usage Graph Section -->
  <section>
    <h2>Energy Usage</h2>

  <!-- Smart Products Section -->
  <section>
    <br><h2>Smart Products</h2>

    <nav id="categoryNav"></nav>
    <!-- Products Container (cards + plus card) -->
    <div id="productsContainer"></div>

</div> <!-- End of Content Wrapper -->

  <div id="footer"></div>
