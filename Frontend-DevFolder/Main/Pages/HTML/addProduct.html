<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Add New Smart Product</title>
  <link rel="stylesheet" href="/Pages/Assets/CSS/styles.css">
  <script src="/Pages/Assets/JS/navbar-footer-loader.js"></script>
</head>
<body>

    <div id="navbar"></div>

    <div class="header-left">
        <div class="header-text">
        <h2>Welcome</h2>
        <p>To your device handling.</p><br>
        </div>
    </div>

  <section>
    <form id="addProductForm">
      <div class="form-group">
        <label for="productCategory">Category:</label>
        <select id="productCategory" required>
          <option value="Living Room">Living Room</option>
          <option value="Kitchen">Kitchen</option>
          <option value="Bedroom">Bedroom</option>
          <option value="All">All</option>
        </select>
      </div>
      <div class="form-group">
        <label for="productType">Type:</label>
        <select id="productType" required>
          <option value="Light">Light</option>
          <option value="Curtain">Curtain</option>
          <option value="Main Door">Main Door</option>
          <option value="Robot">Robot</option>
          <option value="Air Conditioning">Air Conditioning</option>
        </select>
      </div>
      <button type="submit" class="primary-button">Add Product</button><br><br>
      <button id="returnButton" class="primary-button">Return</button>
    </form>
  </section>

  <div id="footer"></div>

  <script src="/Pages/Assets/JS/addProduct.js"></script>
</body>
</html>
