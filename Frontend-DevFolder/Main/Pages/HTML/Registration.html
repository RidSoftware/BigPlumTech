<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Big Plum Tech</title>
    <link rel="stylesheet" href="/Pages/Assets/CSS/Login-Registration.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script defer src="/Pages/Assets/JS/registration-validation.js"></script>
    <script defer src="/Pages/Assets/JS/content-loader.js"></script>
</head>

<body>

    <div class="page-container">
        <!-- Left Section: Registration Form -->
        <div class="container-registration">
            <h2>Register for Big Plum Tech!</h2>
            <form id="registrationForm">
                <label for="fullname">Full Name:</label>
                <input placeholder="Full name" type="text" id="fullname" name="fullname" required>

                <label for="email">Email:</label>
                <input placeholder="Email" type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <div class="password-container">
                    <input placeholder="Password" type="password" id="password" name="password" required>
                    <i class="fa fa-eye-slash" id="togglePassword"></i>
                </div>
                
                <label for="confirmPassword">Confirm Password:</label>
                <input placeholder="Confirm Password" type="password" id="confirmPassword" name="confirmPassword" required>

                <label for="userType">User Type:</label>
                <select id="userType" name="userType" required>
                    <option value="">Select</option>
                    <option value="homeUser">Home User</option>
                    <option value="homeManager">Home Manager</option>
                </select>

                <!-- Admin Code Field (Hidden by Default) -->
                <div id="adminCodeField" class="hidden">
                    <label for="adminCode">Admin Code:</label>
                    <input type="text" id="adminCode" name="adminCode" readonly>
                </div>

                <p class="terms">I agree to the Terms & Conditions</p>
                <label class="terms-style">
                    <input type="checkbox" id="terms" required>
                </label>

                <button type="submit" class="submit-button">Register</button>
            </form>
            <p>Already have an account? <a href="Login.html">Login here</a></p>
        </div>

        <!-- Right Section: Promo Text -->
        <div class="promo-text">
            <h2>Join Big Plum Tech</h2>
            <p>Experience seamless control over your smart home.</p>
            <p>Sign up today and manage your home with ease.</p>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer"></div>

</body>
</html>
