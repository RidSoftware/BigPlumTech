<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Big Plum Tech</title>
    <link rel="stylesheet" href="../Assets/CSS/Login-Registration.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script defer src="../Assets/JS/navbar-footer-loader.js"></script>
    <script defer src="../Assets/JS/forgot-password.js"></script>
</head>
<body>

    <div class="page-container">
        <!-- Forgot Password Section -->
        <div class="container-login">
            <h2>Reset Password</h2>
            <p>Enter your registered email to reset your password.</p>
            
            <form id="forgotPasswordForm">
                <input type="email" id="resetEmail" placeholder="Enter your email" required>
                <p id="resetErrorMessage" class="error-message"></p>
                <button type="submit" class="submit-button">Reset Password</button>
            </form>

            <br>
            <p><a href="login.html">Back to Login</a></p>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer"></div>

</body>
</html>
