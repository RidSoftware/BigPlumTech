<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automation Control</title>
  <link rel="stylesheet" href="../Assets/CSS/Automation.css">
  <script src="../Assets/JS/automation.js" defer type="module"></script>
  <script src="../Assets/JS/deviceAPI.js" defer type="module"></script>
  <script src="../Assets/JS/navbar-footer-loader.js" defer></script>
</head>
<body>
  <div id="navbar"></div>

  <!-- Main Wrapper for content (not using body flex to center content) -->
  <div class="main-wrapper">
    <div class="container">
      <h1>Automation Control Panel</h1>
      <p>This is the automation control panel, where you (admin) can set automation for smart devices for users.</p>
      <br>
      <p>Keep in mind that this automation applies every day and will display on the Home User's dashboard.</p>
      <br>
      <form id="automation-form">
        <label for="device">Device Type:</label>
        <select id="device">
          <option value="Light">Light</option>
          <option value="Curtain">Curtain</option>
          <option value="Main Door">Main Door</option>
          <option value="Robot">Robot</option>
          <option value="Air Conditioning">Air Conditioning</option>
          <option value="Washing Machine">Washing Machine</option>
          <option value="Dryer">Dryer</option>
        </select>
        
        <!-- Device Selector -->
        <div id="device-selector" class="device-selector">
          <h3>Select Specific Device:</h3>
          <div id="device-list-container" class="device-list-container">
            <!-- Device options will be populated here -->
          </div>
        </div>

        <label for="start-time">Start Time (24h):</label>
        <input type="time" id="start-time" required>

        <label for="end-time">End Time (24h):</label>
        <input type="time" id="end-time" required>

        <label for="status">Status at Start Time:</label>
        <select id="status">
          <option value="ON">ON</option>
          <option value="OFF">OFF</option>
        </select>
        
        <button type="submit">Save Automation</button>
      </form>
    </div>
  </div>

  <!-- Dark Overlay and Confirmation Panel -->
  <div id="confirmationOverlay" class="confirmation-overlay"></div>
  <div id="confirmation-message" class="confirmation-container" style="display: none;">
    <!-- Content is dynamically added via JS -->
  </div>

  <div id="footer"></div>
</body>
</html>
