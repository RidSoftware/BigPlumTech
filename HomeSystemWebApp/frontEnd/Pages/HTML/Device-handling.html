<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add New Smart Product</title>
  <link rel="stylesheet" href="../Assets/CSS/Device-handling.css" />
  <script defer src="../Assets/JS/navbar-footer-loader.js"></script>
  <script defer src="../Assets/JS/device-handling.js"></script>
</head>
<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Add New Smart Product Section -->
  <div class="add-product-container fade-in section-container">
    <h2>Add a New Smart Product</h2>
    <p>Customize and add your smart home devices for better automation and control.</p>

    <!-- Product Form -->
    <form id="addProductForm">
      <div class="form-group">
        <label for="deviceName">Name:</label>
        <input type="text" name="deviceName" id="deviceName" required />
      </div>
      <div id="errMsg"></div>
      <div class="form-group">
        <label for="productCategory">Category:</label>
        <select id="productCategory" required>
          <option value="Living Room">Living Room</option>
          <option value="Kitchen">Kitchen</option>
          <option value="Bedroom">Bedroom</option>
          <option value="All">All</option>
        </select>
      </div>
      <div class="form-group">
        <label for="productType">Device Type:</label>
        <select id="productType" required>
          <option value="Light">Light</option>
          <option value="Curtain">Curtain</option>
          <option value="Main Door">Main Door</option>
          <option value="Robot">Robot</option>
          <option value="Air Conditioning">Air Conditioning</option>
        </select>
      </div>
      <button type="submit" class="primary-button">Add Product</button>
    </form>

    <!-- Return Button -->
    <button id="returnButton" class="secondary-button">Return</button>
  </div>

  <!-- Smart Product Controller Section -->
  <div class="section-container">
    <h2>Smart Product Controller</h2>
    <p id="product-controller-text">
      <!-- Dynamically update this text depending on user type -->
    </p>

    <!-- Device Management Section -->
    <section class="device-management">
      <h3>Control Smart Devices</h3>
      <div class="filter-section">
        <label for="roomFilter">Filter by Room:</label>
        <select id="roomFilter">
          <option value="all">All</option>
          <option value="Living Room">Living Room</option>
          <option value="Kitchen">Kitchen</option>
          <option value="Bedroom">Bedroom</option>
        </select>
      </div>
      <div class="device-list">
        <!-- Device items will be rendered here as cards -->
      </div>
    </section>
  </div>

  <!-- Dark Overlay & Confirmation Message -->
  <div id="confirmationOverlay" class="confirmation-overlay"></div>
  <div id="confirmationMessage"></div>

  <!-- Footer -->
  <div id="footer"></div>
</body>
</html>
