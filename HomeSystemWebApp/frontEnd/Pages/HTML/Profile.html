<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Big Plum Tech</title>
    <link rel="stylesheet" href="../Assets/CSS/Profile-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script defer src="../Assets/JS/navbar-footer-loader.js"></script>
    <script defer src="../Assets/JS/profile.js"></script>
    
</head>
<body>
    <div id="navbar"></div>

    <div id="content-wrapper">
        <section class="profile-container fade-in">
            <h2>My Profile</h2><br>
            <div class="profile-card">
                <div class="profile-pic-wrapper">
                    <img id="profile-pic" src="" alt="Profile Picture">
                    <i id="profile-icon" class="fa fa-user-circle hidden" style="font-size: 100px;"></i>
                </div>
                
                <h3 id="profile-name">Loading...</h3>
                <p id="profile-email">Loading...</p>
                <a href="Settings.html" class="btn">Edit Profile</a>
            </div>
        </section>
    </div>
    
    <div id="footer"></div>
</body>
</html>
